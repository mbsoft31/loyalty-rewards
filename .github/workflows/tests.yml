name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHP ${{ matrix.php-version }} Core
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_sqlite
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Run PHPStan
        run: composer stan

      - name: Run code style check
        run: composer lint

      - name: Run tests
        run: composer test

      - name: Run tests with coverage
        if: matrix.php-version == '8.3'
        run: composer test:clover

      - name: Enforce coverage >= 80%
        if: matrix.php-version == '8.3'
        run: |
          php -r '$x=simplexml_load_file("coverage.xml"); $m=$x->project->metrics; $covered=(int)$m["coveredstatements"]; $total=max(1,(int)$m["statements"]); $pct=($covered/$total)*100; echo "Coverage: ".round($pct,2)."%\n"; if($pct<80){fwrite(STDERR, "Coverage ".round($pct,2)."% below threshold (80%)\n"); exit(1);} else { echo "OK: coverage threshold met.\n"; }'
