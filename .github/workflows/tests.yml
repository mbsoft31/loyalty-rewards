name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_sqlite
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run PHPStan (non-blocking)
        continue-on-error: true
        run: composer stan

      - name: Run code style check (non-blocking)
        continue-on-error: true
        run: composer lint

      - name: Run tests
        run: composer test

      - name: Run tests with coverage
        if: matrix.php-version == '8.2'
        run: composer test:clover

      - name: Enforce coverage >= 80%
        if: matrix.php-version == '8.2'
        run: |
          php -r '$x=simplexml_load_file("coverage.xml"); $m=$x->project->metrics; $covered=(int)$m["coveredstatements"]; $total=max(1,(int)$m["statements"]); $pct=($covered/$total)*100; echo "Coverage: ".round($pct,2)."%\n"; if($pct<80){fwrite(STDERR, "Coverage ".round($pct,2)."% below threshold (80%)\n"); exit(1);} else { echo "OK: coverage threshold met.\n"; }'

  db-tests:
    runs-on: ubuntu-latest
    name: DB Integration (PHP ${{ matrix.php-version }}, DB ${{ matrix.db }})
    strategy:
      matrix:
        php-version: ['8.2']
        db: [ 'pgsql', 'mysql' ]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: loyalty_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d loyalty_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: loyalty_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_sqlite, pdo_mysql, pdo_pgsql

      - name: Install DB clients (Postgres)
        if: matrix.db == 'pgsql'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install DB clients (MySQL)
        if: matrix.db == 'mysql'
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      # DBs are created via service envs; still keep checks below

      - name: Debug Database Connection (PostgreSQL)
        if: matrix.db == 'pgsql'
        env:
          PGPASSWORD: postgres
        run: |
          echo "Testing PostgreSQL connection..."
          for i in {1..20}; do
            psql -h 127.0.0.1 -U postgres -d loyalty_test -c "SELECT 1;" && break || sleep 2;
          done
          psql -h 127.0.0.1 -U postgres -l

      - name: Debug Database Connection (MySQL)
        if: matrix.db == 'mysql'
        run: |
          echo "Testing MySQL connection..."
          for i in {1..20}; do
            mysqladmin ping -h 127.0.0.1 -uroot -proot && break || sleep 2;
          done
          mysql -h 127.0.0.1 -uroot -proot -e "SHOW DATABASES;"

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Set DB environment
        run: |
          if [ "${{ matrix.db }}" = "mysql" ]; then
            echo "DB_PORT=3306" >> $GITHUB_ENV
            echo "DB_USERNAME=root" >> $GITHUB_ENV
            echo "DB_PASSWORD=root" >> $GITHUB_ENV
          else
            echo "DB_PORT=5432" >> $GITHUB_ENV
            echo "DB_USERNAME=postgres" >> $GITHUB_ENV
            echo "DB_PASSWORD=postgres" >> $GITHUB_ENV
          fi
          echo "DB_CONNECTION=${{ matrix.db }}" >> $GITHUB_ENV
          echo "DB_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "DB_DATABASE=loyalty_test" >> $GITHUB_ENV

      - name: Run DB integration tests
        run: composer test:integration
